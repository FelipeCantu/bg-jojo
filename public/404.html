<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found — Give Back Jojo</title>
  <link rel="icon" type="image/svg+xml" href="/flamingohats.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', 'Segoe UI', sans-serif;
      background: #f0f7f6;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(2, 74, 71, 0.12);
      max-width: 520px;
      width: 100%;
      padding: 3rem 2.5rem;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 1.5rem;
    }

    .logo-wrap img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: #024A47;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #024A47;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: #024A47;
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: #036b67;
    }

    .hotline {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e0e0e0;
      font-size: 0.875rem;
      color: #888;
    }

    .hotline a {
      color: #024A47;
      font-weight: 600;
      text-decoration: none;
    }

    .hotline a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      .error-code { font-size: 4.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="/hatflamingo-192x192.png" alt="Give Back Jojo logo" />
    </div>
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or may have moved. Let's get you back on track.</p>
    <a href="/" class="btn">Back to Home</a>
    <div class="hotline">
      Need support right now?
      <a href="/hotlines">View Crisis Hotlines &rarr;</a>
    </div>
  </div>
</body>
</html>
