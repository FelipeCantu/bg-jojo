[build]
  command = "npm run build"
  publish = "build"

[[headers]]
  for = "/*"
  [headers.values]
    # Allow Firebase OAuth popups (Google/Facebook sign-in) to close themselves.
    # Netlify's default COOP: same-origin blocks cross-origin window.close calls.
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

    # Prevent clickjacking — disallow this site from being embedded in iframes
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing attacks
    X-Content-Type-Options = "nosniff"

    # Control referrer information sent to third-party sites
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Enforce HTTPS for 1 year, including subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Restrict access to browser features not needed by this app
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
