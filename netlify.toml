[build]
  command = "npm run build"
  publish = "build"

# Proxy Firebase auth handler through our domain so Safari ITP doesn't block
# cross-site storage access when authDomain is firebaseapp.com.
[[redirects]]
  from = "/__/auth/*"
  to = "https://bg-jojo.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    # Allow Firebase OAuth popups (Google/Facebook sign-in) to close themselves.
    # Netlify's default COOP: same-origin blocks cross-origin window.close calls.
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
